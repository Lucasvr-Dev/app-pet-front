<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diário Pet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>

<body class="bg-light">
<div class="container py-4">

  <h1 class="text-center mb-4">Diário Pet</h1>

  
  <div class="card mb-3">
    <div class="card-body">
      <h4>Cadastro de Pet</h4>

      <form id="pet-form">
        <input type="hidden" id="pet-id"/>

        <input class="form-control mb-2" id="pet-name" placeholder="Nome" required/>
        <input class="form-control mb-2" id="pet-type" placeholder="Tipo" required/>
        <input class="form-control mb-2" id="pet-age" type="number" placeholder="Idade" required/>

        <div class="d-flex gap-2">
          <button class="btn btn-primary">Salvar Pet</button>
          <button type="button" id="cancel-pet" class="btn btn-secondary d-none">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  
  <div class="card mb-3">
    <div class="card-body">
      <h4>Registro</h4>

      <form id="entry-form">
        <input type="hidden" id="entry-id"/>

        <input class="form-control mb-2" id="title" placeholder="Título" required/>
        <textarea class="form-control mb-2" id="description" placeholder="Descrição" required></textarea>
        <input class="form-control mb-2" id="happenedAt" type="datetime-local" required/>

        <select id="pet-select" class="form-control mb-2" required></select>

        <div class="d-flex gap-2">
          <button class="btn btn-success">Salvar Registro</button>
          <button type="button" id="cancel-entry" class="btn btn-secondary d-none">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  
  <div class="card">
    <div class="card-body">
      <h4>Registros</h4>
      <div id="entries-list"></div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
